training:
  # Cap training data to homes at or below this price. Homes well above
  # your criteria.max_price add noise without improving predictions for
  # the price range you actually care about. Set to null to disable.
  max_price: 1200000

criteria:
  max_price: 800000
  min_beds: 3
  min_baths: 2.0
  min_sqft: 1600
  max_year_built: null          # set to e.g. 2000 if you want only homes built after 2000
  max_home_age_years: 35        # no homes older than 35 years — set to null to remove this filter
  min_lot_sqft: 5000
  max_days_on_market: null      # set to e.g. 30 to only see fresh listings

scoring:
  min_value_score: 0.05         # flag homes priced 5%+ below predicted value
  top_n_alerts: 15               # include top N homes in each email alert

adu:
  enabled: true
  # Mortgage assumptions for net monthly cost calculation.
  # Set mortgage_rate_pct to null to auto-load the latest rate from FRED Data.
  mortgage_rate_pct: null        # null = auto-detect from data/raw/FRED Data/MORTGAGE30US.csv
  down_payment_pct: 5            # percent down (5 = 5%)
  mortgage_term_years: 30
  # Default monthly ADU rent when ZIP-level data isn't available.
  default_adu_rent: 1000
  # Max listings to fetch descriptions for (Redfin detail API, ~1.5s each).
  max_description_fetches: 700
  # Minimum ADU confidence to flag a listing (0.0–1.0).
  min_adu_confidence: 0.3

notifications:
  email_to: "pintothegreat1@gmail.com"
  email_from: "pintothegreat3@gmail.com"

# How stale each data source can be before an alert email is sent.
# Set a value to null to disable alerts for that source.
data_freshness:
  redfin_days: 1      # Redfin listing CSVs — refreshed daily via scheduled --refetch
  bps_days: 45        # Census BPS permit files — monthly release with ~1-month lag
  zhvi_days: 45       # Zillow ZHVI city CSV — monthly release with ~1-month lag
  acs_days: 400       # Census ACS income — annual release (~13 months between updates)

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  model_path: "models/hedonic_model.joblib"
